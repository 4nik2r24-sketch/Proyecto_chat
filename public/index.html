<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Proyecto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="justify-content: center; align-items: center;">

    <div style="background-color: #181825; padding: 2.5rem; border-radius: 12px; border: 1px solid #313244; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 380px;">
        <h2 style="color: #89b4fa; margin-bottom: 0.5rem;">Proyecto de Chat</h2>
        <p style="color: #a6adc8; font-size: 0.9rem; margin-bottom: 1.5rem;">Sistema de comunicación en tiempo real</p>
        
        <form id="form-login" style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" id="apodo" placeholder="Ingresa tu nombre de usuario..." required autocomplete="off" 
                   style="padding: 12px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: white; outline: none; font-size: 1rem;">
            <button type="submit" style="padding: 12px; background: #89b4fa; color: #11111b; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                Ingresar
            </button>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
